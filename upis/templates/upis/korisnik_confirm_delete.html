{% extends "upis/base.html" %}
{% block content %}
<article class="media content-section">
    <div class="media-body">
        <h2>Obriši korisnika</h2>
        <p>Jeste li sigurni da želite obrisati korisnika: <strong>{{ object.email }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <a href="{% url 'korisnici' %}" class="btn btn-secondary">Odustani</a>
            <button type="submit" class="btn btn-danger">Obriši</button>
        </form>
    </div>
</article>
{% endblock %}
